<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>


    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">

    <!-- AOS Scroll Animation -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <!-- GSAP Hero Animation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        body {
            font-family: Poppins;
            background: #020617
        }

        .glow {
            box-shadow: 0 0 60px rgba(0, 255, 170, .35);
        }

        .light {
            background: #f8fafc;
            color: #020617;
        }

        .light nav {
            background: white
        }

        .light .card {
            background: #e2e8f0
        }
    </style>
    <title>ShadowStack</title>

</head>

<body class="font-[Poppins]">

    <!-- navbar -->
    <nav class="fixed w-full z-50 backdrop-blur-xl bg-white/5 border-b border-white/10">
        <div class="max-w-9xl mx-auto flex justify-between items-center p-4 px-20">

            <!-- logo -->
            <div>
                <img src="image/logo.png" class="w-20">
            </div>

            <!-- Desktop Menu -->
            <ul class="hidden md:flex gap-20 text-white/80 font-semibold">
                <li><a href="index.html" class="hover:text-green-400">Home</a></li>
                <li><a href="about.html" class="hover:text-green-400">About</a></li>
                <li><a href="skills.html" class="hover:text-green-400">Skills</a></li>
                <li><a href="projects.html" class="hover:text-green-400">Projects</a></li>
                <li><a href="services.html" class="hover:text-green-400">Services</a></li>

            </ul>

            <!-- Right Buttons -->
            <div class="flex items-center gap-10">
                <button id="themeToggle" class="text-xl">🌙</button>

                <button id="menuBtn" class="md:hidden text-3xl text-white">☰</button>


            </div>

        </div>

        <!-- Mobile Menu -->
        <div id="mobileMenu" class="hidden md:hidden bg-black/95 text-center p-8 space-y-6">
            <a href="index.html" class="block">Home</a>
            <a href="about.html" class="block">About</a>
            <a href="skills.html" class="block">Skills</a>
            <a href="projects.html" class="block">Projects</a>
            <a href="services.html" class="block">Services</a>
            <a href="contact.html" class="block">Contact</a>
        </div>
    </nav>

    <!-- navbar end  -->

    <!-- HERO SECTION -->
    <section>
        <div class="absolute w-72 h-72 bg-pink-500 rounded-full blur-[120px] opacity-30 animate-pulse"></div>

        <div>

            <div
                class="min-h-screen bg-gradient-to-br from-[#020617] via-[#020617] to-[#071a3a] text-white flex items-center pt-20">




                <div class="max-w-9xl mx-auto px-6 grid md:grid-cols-2 gap-10 items-center">

                    <!-- LEFT TEXT -->
                    <div class="space-y-4">

                        <p class="text-sky-200 text-lg">👋 𝓐𝓼𝓼𝓪𝓵𝓪𝓶𝓾 𝓐𝓵𝓪𝓲𝓴𝓾𝓶, I'm</p>

                        <h1 class="text-6xl font-extrabold leading-tight">
                            𝙈𝙍 𝘾𝘼𝘾𝙏𝙐𝙎 <br>
                            <span class="bg-gradient-to-r from-green-400 to-emerald-500 bg-clip-text text-transparent">
                                Frontend Developer
                            </span>
                        </h1>

                        <p class="text-gray-400 text-lg max-w-lg leading-relaxed">
                            I craft beautiful, fast and responsive websites using
                            modern technologies like React, Tailwind and JavaScript.
                        </p>

                        <!-- BUTTONS -->
                        <div class="flex gap-4 pt-4">
                            <button>
                                <a href="contact.html"
                                    class="py-3 px-6 bg-green-400 rounded-xl text-black font-bold italic text-lg">Hire
                                    Me</a>
                            </button>

                            <button>
                                <a href="projects.html"
                                    class="border border-green-400 px-7 py-3 rounded-xl hover:bg-green-400 hover:text-black transition duration-300">View
                                    Projects</a>
                                
                            </button>
                        </div>

                    </div>


                    <!-- RIGHT IMAGE -->
                    <div class="flex justify-center">

                        <div class="relative group">

                            <!-- GLOW -->
                            <div
                                class="absolute -inset-2 bg-gradient-to-r from-green-700 to-emerald-800 rounded-full blur-2xl opacity-20 group-hover:opacity-60 transition">
                            </div>

                            <!-- IMAGE -->
                            <img src="image/image2.png"
                                class="relative w-80 h-80 object-cover rounded-full border-4 border-rose-900 shadow-[0_0_810px_#ef4444] hover:animate-spin">

                        </div>

                    </div>

                </div>
            </div>

        </div>

    </section>

    <!-- javaScript codes sss -->

    <script>
        gsap.to("#pageTransition", { y: "-100%", duration: 1 })

        document.querySelectorAll("a").forEach(link => {
            link.addEventListener("click", e => {
                if (link.href.includes(".html")) {
                    e.preventDefault()
                    gsap.to("#pageTransition", {
                        y: "0%", duration: .6,
                        onComplete: () => { window.location = link.href }
                    })
                }
            })
        })
    </script>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>AOS.init();</script>
    <script>
        gsap.from("#heroText", { y: 80, opacity: 0, duration: 1.5 })
        gsap.from("img", { scale: 0, opacity: 0, duration: 1.5, delay: .5 })
    </script>
    <script>
        document.getElementById("menuBtn").onclick = () => {
            document.getElementById("mobileMenu").classList.toggle("hidden")
        }
    </script>
    <script src="main.js"></script>
</body>

</html>
