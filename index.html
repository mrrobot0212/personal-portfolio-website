<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>


    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">

    <!-- AOS Scroll Animation -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <!-- GSAP Hero Animation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .animate-fadeUp {
            animation: fadeUp .8s ease forwards
        }

        .delay-100 {
            animation-delay: .2s
        }

        .delay-200 {
            animation-delay: .4s
        }

        .delay-300 {
            animation-delay: .6s
        }
    </style>

    <title>ShadowStack</title>

</head>


<body class="font-[Poppins] body bg-slate-950 text-white scroll-smooth">


    <!-- navbar -->
    <nav class="fixed w-full z-50 backdrop-blur-xl bg-white/5 border-b border-white/10">
        <div class="max-w-9xl mx-auto flex justify-between items-center p-4 px-20">

            <!-- logo -->
            <div>
                <img src="image/logo.png" class="w-20">
            </div>

            <!-- Desktop Menu -->
            <ul class="hidden md:flex gap-20 text-white/80 font-semibold">
                <li><a href="index.html" class="hover:text-green-400">Home</a></li>
                <li><a href="about.html" class="hover:text-green-400">About</a></li>
                <li><a href="skills.html" class="hover:text-green-400">Skills</a></li>
                <li><a href="projects.html" class="hover:text-green-400">Projects</a></li>
                <li><a href="services.html" class="hover:text-green-400">Services</a></li>

            </ul>

            <!-- Right Buttons -->
            <div class="flex items-center gap-10">
                <button id="themeToggle" class="text-xl">🌙</button>

                <button id="menuBtn" class="md:hidden text-3xl text-white">☰</button>


            </div>

        </div>

        <!-- Mobile Menu -->
        <div id="mobileMenu" class="hidden md:hidden bg-black/95 text-center p-8 space-y-6">
            <a href="index.html" class="block">Home</a>
            <a href="about.html" class="block">About</a>
            <a href="skills.html" class="block">Skills</a>
            <a href="projects.html" class="block">Projects</a>
            <a href="services.html" class="block">Services</a>
            <a href="contact.html" class="block">Contact</a>
        </div>
    </nav>

    <!-- navbar end  -->


    <!-- hero section -->

    <section id="hero" class="relative min-h-screen bg-slate-950 overflow-hidden flex items-center">

        <!-- grid background -->
        <div
            class="absolute inset-0 opacity-[0.07] bg-[linear-gradient(#fff_1px,transparent_1px),linear-gradient(90deg,#fff_1px,transparent_1px)] bg-[size:60px_60px]">
        </div>

        <!-- spotlight -->
        <div id="spotlight"
            class="pointer-events-none absolute w-[600px] h-[600px] rounded-full blur-3xl bg-[radial-gradient(circle,rgba(34,197,94,0.18),transparent_60%)]">
        </div>

        <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">

            <!-- LEFT GLASS CARD -->
            <div class="backdrop-blur-xl bg-white/[0.03] border border-white/10 rounded-3xl p-10 shadow-2xl space-y-5">

                <p class="text-emerald-400 animate-fadeUp">👋 Assalamu Alaikum, I'm</p>

                <h1 class="text-6xl font-extrabold text-white animate-fadeUp delay-100">
                    MR CACTUS
                </h1>

                <h2
                    class="text-4xl font-bold bg-gradient-to-r from-emerald-400 to-sky-400 text-transparent bg-clip-text animate-fadeUp delay-200">
                    Frontend Developer
                </h2>

                <p class="text-gray-400 max-w-md animate-fadeUp delay-300">
                    I craft beautiful, fast and modern websites using React, Tailwind & JavaScript.
                </p>

                <div class="flex gap-6 pt-4">
                    
                    <a href="contact.html"class="block magnetic px-7 py-3 bg-emerald-500 rounded-xl
                        font-semibold shadow-lg shadow-emerald-500/30 hover:scale-110 transition">Hire Me</a>

                
                    

                <a href="projects.html"class="magnetic px-7 py-3 border border-sky-400 text-sky-400 rounded-xl hover:bg-sky-400/10 hover:scale-110 transition">
                        Projects
                -></a>    
                  
                </div>

            </div>

            <!-- RIGHT IMAGE -->
            <div class="flex justify-center perspective-[1000px]">
                <img id="tilt" src="image/image2.png"
                    class="w-80 h-80 rounded-full object-cover border border-white/10 shadow-2xl">
            </div>

        </div>
    </section>

    <!-- javaScript codes sss -->
    <script>

        /* spotlight mouse follow */
        const spotlight = document.getElementById("spotlight");
        document.addEventListener("mousemove", e => {
            spotlight.style.left = e.pageX - 300 + "px";
            spotlight.style.top = e.pageY - 300 + "px";
        });

        /* 3D tilt image */
        const tilt = document.getElementById("tilt");
        document.addEventListener("mousemove", e => {
            let x = (window.innerWidth / 2 - e.pageX) / 25;
            let y = (window.innerHeight / 2 - e.pageY) / 25;
            tilt.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });

        /* magnetic buttons */
        document.querySelectorAll(".magnetic").forEach(btn => {
            btn.addEventListener("mousemove", e => {
                const rect = btn.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                btn.style.transform = `translate(${x * 0.2}px,${y * 0.2}px)`;
            });
            btn.addEventListener("mouseleave", () => btn.style.transform = "translate(0,0)");
        });

    </script>
    <script src="main.js"></script>
</body>

</html>
